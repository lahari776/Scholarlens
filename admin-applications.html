<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Applications - ScholarLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="admin" data-auth="admin">
  <div id="site-nav"></div>
  <div class="app-layout">
    <aside data-sidebar="admin" data-active="admin-applications"></aside>
    <main class="main-content">
      <p class="label">Admin</p>
      <h2 style="margin-bottom:1.5rem;">Manage Applications</h2>
      <div class="card" style="padding:0; overflow:hidden;">
        <table>
          <thead><tr><th>Student</th><th>Scholarship</th><th>Applied</th><th>Current Status</th><th>Update</th></tr></thead>
          <tbody>
            <tr><td><strong>Arjun Sharma</strong><br><span style="font-size:0.78rem;color:#7a7060;">arjun@example.com</span></td><td>STEM Excellence Award</td><td class="mono" style="font-size:0.82rem;">20 Mar</td><td><span class="status status-review mono" style="font-size:0.78rem;">Under Review</span></td><td><select class="form-select" style="width:140px; padding:0.3rem 0.5rem; font-size:0.8rem;"><option>Under Review</option><option>Approved</option><option>Rejected</option></select></td></tr>
            <tr><td><strong>Priya Rajan</strong><br><span style="font-size:0.78rem;color:#7a7060;">priya@example.com</span></td><td>AI Innovation Grant</td><td class="mono" style="font-size:0.82rem;">18 Mar</td><td><span class="status status-applied mono" style="font-size:0.78rem;">Applied</span></td><td><select class="form-select" style="width:140px; padding:0.3rem 0.5rem; font-size:0.8rem;"><option>Applied</option><option>Under Review</option><option>Approved</option><option>Rejected</option></select></td></tr>
            <tr><td><strong>Karthik M</strong><br><span style="font-size:0.78rem;color:#7a7060;">karthik@example.com</span></td><td>National Merit</td><td class="mono" style="font-size:0.82rem;">10 Mar</td><td><span class="status status-approved mono" style="font-size:0.78rem;">Approved</span></td><td><select class="form-select" style="width:140px; padding:0.3rem 0.5rem; font-size:0.8rem;"><option>Approved</option><option>Rejected</option></select></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
