<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarship Detail - ScholarLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body data-page="detail" data-auth="student">
  <div id="site-nav"></div>
  <div class="container section-sm">
    <a href="scholarships.html" class="btn btn-outline btn-sm" style="margin-bottom:1.5rem;">Back to Browse</a>
    <div class="two-column-page" style="display:grid; grid-template-columns:2fr 1fr; gap:2rem;">
      <div>
        <div class="card">
          <span id="detail-type-tag" class="tag" hidden></span>
          <h2 id="detail-title" style="margin:0.75rem 0 0.5rem;"></h2>
          <p id="detail-provider" class="text-muted" style="margin-bottom:1.5rem;"></p>
          <hr class="fancy">
          <h3 style="margin-bottom:0.75rem;">About This Opportunity</h3>
          <p id="detail-description" style="line-height:1.75; color:#4a4035;"></p>
          <hr class="fancy">
          <h3 style="margin-bottom:0.75rem;">Key Details</h3>
          <ul id="detail-key-list" style="padding-left:1.25rem; line-height:2; color:#4a4035;"></ul>
          <hr class="fancy">
          <h3 id="detail-secondary-heading" style="margin-bottom:0.75rem;">Eligibility Criteria</h3>
          <ul id="detail-secondary-list" style="padding-left:1.25rem; line-height:2; color:#4a4035;"></ul>
        </div>
      </div>
      <div style="display:flex; flex-direction:column; gap:1.25rem;">
        <div class="stat-card">
          <div id="detail-benefit-label" class="stat-label">Award Amount</div>
          <div id="detail-benefit-value" class="stat-num" style="margin-top:0.5rem;"></div>
          <div id="detail-benefit-subtitle" class="stat-label" style="margin-top:0.5rem;"></div>
        </div>
        <div class="card">
          <p class="label">Deadline</p>
          <p id="detail-deadline-value" style="font-size:1.1rem; font-weight:600; margin-top:0.3rem;"></p>
          <div id="detail-deadline-alert" class="alert alert-warning" style="margin-top:0.75rem; padding:0.6rem 0.75rem;">Loading details...</div>
        </div>
        <div class="card">
          <p id="detail-side-meta-label" class="label">Your Match</p>
          <div style="margin-top:0.75rem;">
            <div id="detail-side-meta-progress" class="progress-bar"><div id="detail-side-meta-fill" class="progress-fill" style="width:0%"></div></div>
            <p id="detail-side-meta-text" style="font-family:'DM Mono',monospace; font-size:0.8rem; margin-top:0.3rem; color:var(--teal);">Loading status...</p>
          </div>
        </div>
        <a id="detail-external-link" class="btn btn-gold btn-lg" href="#" target="_blank" rel="noopener noreferrer" style="width:100%;" aria-disabled="true">Apply Now</a>
        <button id="register-button" class="btn btn-outline" type="button" style="width:100%;">Mark as Registered</button>
        <button id="detail-save-button" class="btn btn-outline" type="button" style="width:100%;">Save Scholarship</button>
      </div>
    </div>
  </div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
