<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ScholarLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body data-page="login">
  <div id="site-nav"></div>
  <div style="min-height:calc(100vh - 62px); display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, var(--ink) 0%, #1a1a1a 100%); padding:2rem;">
    <div style="width:100%; max-width:420px;">
      <div style="text-align:center; margin-bottom:2rem;">
        <p class="label" style="margin-bottom:0.5rem;">Welcome Back</p>
        <h2 style="color:var(--white);">Login to ScholarLens</h2>
      </div>
      <div class="card">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input id="login-email" type="email" class="form-input" placeholder="student@example.com">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-pass">Password</label>
          <input id="login-pass" type="password" class="form-input" placeholder="Enter your password">
        </div>
        <div style="text-align:right; margin-bottom:1.25rem;">
          <a href="#" style="font-size:0.82rem; color:var(--teal); font-family:'DM Mono',monospace;">Forgot Password?</a>
        </div>
        <button class="btn btn-gold" type="button" style="width:100%;" onclick="handleLogin()">Login</button>
        <hr class="fancy">
        <p style="text-align:center; font-size:0.85rem;">
          Don't have an account?
          <a href="signup.html" style="color:var(--teal); font-family:'DM Mono',monospace; font-size:0.82rem;">Sign Up</a>
        </p>
      </div>
    </div>
  </div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
