<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - ScholarLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body data-page="profile" data-auth="student">
  <div id="site-nav"></div>
  <div class="app-layout">
    <aside data-sidebar="student" data-active="profile"></aside>
    <main class="main-content">
      <p class="label">Account</p>
      <h2 style="margin-bottom:0.5rem;">My Profile</h2>
      <p class="text-muted" style="margin-bottom:2rem;">Your profile data powers AI scholarship matching.</p>
      <div id="profile-status" class="alert alert-info" style="display:none; margin-bottom:1.5rem;"></div>
      <form id="profile-form">
      <div class="two-column-page" style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
        <div class="card">
          <h3 style="margin-bottom:1.25rem; border-bottom:1px solid #ede7d4; padding-bottom:0.75rem;">Personal Information</h3>
          <div class="form-group"><label class="form-label">Full Name</label><input id="profile-full-name" type="text" class="form-input" value="Arjun Sharma"></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Age</label><input id="profile-age" type="number" class="form-input" value="21"></div>
            <div class="form-group"><label class="form-label">Gender</label><select id="profile-gender" class="form-select"><option>Male</option><option>Female</option><option>Other</option></select></div>
          </div>
          <div class="form-group"><label class="form-label">Location / State</label><input id="profile-region" type="text" class="form-input" value="Tamil Nadu"></div>
          <div class="form-group"><label class="form-label">Category</label><select id="profile-category" class="form-select"><option>General</option><option>OBC</option><option>SC/ST</option><option>EWS</option></select></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:1.25rem; border-bottom:1px solid #ede7d4; padding-bottom:0.75rem;">Academic Details</h3>
          <div class="form-group"><label class="form-label">Degree</label><select id="profile-degree" class="form-select"><option>B.Tech</option><option>B.Sc</option><option>B.Com</option><option>MBA</option><option>M.Tech</option></select></div>
          <div class="form-group"><label class="form-label">Specialisation</label><input id="profile-specialisation" type="text" class="form-input" value="Computer Science Engineering"></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">GPA / CGPA</label><input id="profile-gpa" type="number" class="form-input" value="8.7" step="0.1"></div>
            <div class="form-group"><label class="form-label">Current Year</label><select id="profile-current-year" class="form-select"><option>1st</option><option>2nd</option><option selected>3rd</option><option>4th</option></select></div>
          </div>
          <div class="form-group"><label class="form-label">Annual Family Income</label><select id="profile-income-range" class="form-select"><option>Below &#8377;1 LPA</option><option selected>&#8377;1-5 LPA</option><option>&#8377;5-10 LPA</option><option>Above &#8377;10 LPA</option></select></div>
        </div>
        <div class="card" style="grid-column:1 / -1;">
          <h3 style="margin-bottom:1.25rem; border-bottom:1px solid #ede7d4; padding-bottom:0.75rem;">Skills and Interests</h3>
          <div class="form-group"><label class="form-label">Skills</label><input id="profile-skills" type="text" class="form-input" value="Python, Machine Learning, Data Analysis, Web Development"></div>
          <div class="form-group"><label class="form-label">Interests</label><textarea id="profile-interests" class="form-textarea" style="min-height:70px;">AI/ML research, open source contribution, competitive programming</textarea></div>
          <div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:1rem;">
            <button id="profile-reset-btn" class="btn btn-outline" type="button">Reset</button>
            <button id="profile-save-btn" class="btn btn-gold" type="submit">Save Profile</button>
          </div>
        </div>
      </div>
      </form>
    </main>
  </div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/js/profile.js"></script>
</body>
</html>
