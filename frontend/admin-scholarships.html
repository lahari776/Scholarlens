<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Scholarships - ScholarLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body data-page="admin" data-auth="admin">
  <div id="site-nav"></div>
  <div class="app-layout">
    <aside data-sidebar="admin" data-active="admin-scholarships"></aside>
    <main class="main-content">
      <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:1.5rem;">
        <div><p class="label">Admin</p><h2>Manage Scholarships</h2></div>
        <button class="btn btn-gold" type="button" onclick="toggleAdminForm()">Add Scholarship</button>
      </div>
      <div id="admin-add-form" class="card" style="display:none; margin-bottom:1.5rem; border-left:4px solid var(--gold);">
        <h3 id="admin-scholarship-form-title" style="margin-bottom:1.25rem;">Add New Scholarship</h3>
        <input id="admin-scholarship-id" type="hidden" value="">
        <div id="admin-scholarship-feedback" style="margin-bottom:1rem; color:var(--red); font-size:0.95rem;"></div>
        <div class="form-group"><label class="form-label">Title</label><input id="admin-scholarship-title" type="text" class="form-input" placeholder="Scholarship name"></div>
        <div class="form-group"><label class="form-label">Description</label><textarea id="admin-scholarship-description" class="form-textarea" placeholder="Describe the scholarship..."></textarea></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Provider</label><input id="admin-scholarship-provider" type="text" class="form-input" placeholder="Provider name"></div>
          <div class="form-group"><label class="form-label">Amount (&#8377;)</label><input id="admin-scholarship-amount" type="number" class="form-input" placeholder="50000"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Deadline</label><input id="admin-scholarship-deadline" type="date" class="form-input"></div>
          <div class="form-group"><label class="form-label">Eligible Degree</label><select id="admin-scholarship-degree" class="form-select"><option value="All">All</option><option value="B.Tech">B.Tech</option><option value="B.Sc">B.Sc</option><option value="MBA">MBA</option></select></div>
        </div>
        <div class="form-group"><label class="form-label">Eligibility</label><input id="admin-scholarship-eligibility" type="text" class="form-input" placeholder="Example: Students with minimum 7.0 GPA"></div>
        <div style="display:flex; gap:1rem; justify-content:flex-end;">
          <button class="btn btn-outline" type="button" onclick="toggleAdminForm()">Cancel</button>
          <button id="admin-scholarship-save" class="btn btn-gold" type="button" onclick="handleAdminScholarshipSave()">Save Scholarship</button>
        </div>
      </div>
      <div class="card" style="padding:0; overflow:hidden;">
        <table>
          <thead><tr><th>Title</th><th>Provider</th><th>Amount</th><th>Deadline</th><th>Actions</th></tr></thead>
          <tbody id="admin-scholarship-list">
            <tr><td colspan="5" style="padding:1rem;">Loading scholarships...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
