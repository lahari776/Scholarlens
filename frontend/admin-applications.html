<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Registrations - ScholarLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body data-page="admin" data-auth="admin">
  <div id="site-nav"></div>
  <div class="app-layout">
    <aside data-sidebar="admin" data-active="admin-applications"></aside>
    <main class="main-content">
      <p class="label">Admin</p>
      <h2 id="admin-applications-heading" style="margin-bottom:1.5rem;">Manage Registrations</h2>
      <div class="card" style="padding:0; overflow:hidden;">
        <table>
          <thead><tr><th>User</th><th>Opportunity</th><th>Registered On</th><th>Label</th></tr></thead>
          <tbody id="admin-applications-table-body">
            <tr><td colspan="4" style="padding:1rem;">Loading registrations...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/app.js"></script>

</html>
