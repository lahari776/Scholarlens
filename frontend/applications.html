<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications - ScholarLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body data-page="applications" data-auth="student">
  <div id="site-nav"></div>
  <div class="app-layout">
    <aside data-sidebar="student" data-active="applications"></aside>
    <main class="main-content">
      <p class="label">Track Registrations</p>
      <h2 style="margin-bottom:0.5rem;">My Applications</h2>
      <p id="applications-summary" class="text-muted" style="margin-bottom:2rem;">Loading your registered opportunities...</p>
      <div class="card" style="padding:0; overflow:hidden;">
        <table>
          <thead>
            <tr>
              <th>Opportunity</th>
              <th>Deadline</th>
              <th>Registered On</th>
              <th>Label</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="applications-table-body">
            <tr>
              <td colspan="5" style="padding:1rem;">Loading registrations...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
