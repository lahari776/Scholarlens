<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarships - ScholarLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body data-page="scholarships">
  <div id="site-nav"></div>
  <div class="page-header">
    <div class="container">
      <p class="label">Explore</p>
      <h2>Browse Scholarships & Opportunities</h2>
      <p id="browse-summary">Live opportunities updated from your ScholarLens feed.</p>
    </div>
  </div>
  <div class="container section-sm">
    <div class="card" style="margin-bottom:1.5rem; padding:1.25rem;">
      <div style="display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end;">
        <div style="flex:2; min-width:220px;">
          <label class="form-label" for="browse-search">Search</label>
          <input id="browse-search" type="text" class="form-input" placeholder="Search by title, description, skills, or tags...">
        </div>
        <div style="flex:1; min-width:150px;">
          <label class="form-label" for="browse-category">Category</label>
          <select id="browse-category" class="form-select">
            <option value="all">All Categories</option>
            <option value="Scholarship">Scholarships</option>
            <option value="Internship">Internships</option>
            <option value="Fellowship">Fellowships</option>
            <option value="Hackathon">Hackathons</option>
            <option value="Workshop/Bootcamp">Workshops / Bootcamps</option>
            <option value="Program">Programs</option>
            <option value="Competition">Competitions</option>
          </select>
        </div>
        <div style="flex:1; min-width:140px;">
          <label class="form-label" for="browse-location">Location</label>
          <select id="browse-location" class="form-select">
            <option value="all">All Locations</option>
            <option value="India">India</option>
            <option value="Remote">Remote</option>
            <option value="Abroad">Abroad</option>
          </select>
        </div>
        <div style="flex:1; min-width:150px;">
          <label class="form-label" for="browse-funding">Funding</label>
          <select id="browse-funding" class="form-select">
            <option value="all">All Funding</option>
            <option value="Fully Funded">Fully Funded</option>
            <option value="Paid">Paid</option>
            <option value="Unpaid">Unpaid</option>
          </select>
        </div>
        <div style="flex:1; min-width:150px;">
          <label class="form-label" for="browse-domain">Domain</label>
          <select id="browse-domain" class="form-select">
            <option value="all">All Domains</option>
            <option value="AI">AI</option>
            <option value="CSE">CSE</option>
            <option value="Core">Core</option>
            <option value="Research">Research</option>
            <option value="Business">Business</option>
          </select>
        </div>
        <div style="flex:1; min-width:160px;">
          <label class="form-label" for="browse-deadline">Deadline</label>
          <select id="browse-deadline" class="form-select">
            <option value="nearest">Upcoming � Nearest First</option>
            <option value="latest">Recently Added</option>
          </select>
        </div>
      </div>
    </div>
    <div class="grid-3" id="scholarship-grid"></div>
  </div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
