<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarships - ScholarLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="scholarships">
  <div id="site-nav"></div>
  <div class="page-header">
    <div class="container">
      <p class="label">Explore</p>
      <h2>Browse Scholarships</h2>
      <p>1,248 scholarships available · Updated daily</p>
    </div>
  </div>
  <div class="container section-sm">
    <div class="card" style="margin-bottom:1.5rem; padding:1.25rem;">
      <div style="display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end;">
        <div style="flex:2; min-width:200px;">
          <label class="form-label">Search</label>
          <input type="text" class="form-input" placeholder="Search scholarships...">
        </div>
        <div style="flex:1; min-width:140px;">
          <label class="form-label">Degree</label>
          <select class="form-select"><option>All Degrees</option><option>B.Tech</option><option>B.Sc</option><option>MBA</option><option>M.Tech</option></select>
        </div>
        <div style="flex:1; min-width:140px;">
          <label class="form-label">Category</label>
          <select class="form-select"><option>All</option><option>General</option><option>OBC</option><option>SC/ST</option><option>EWS</option></select>
        </div>
        <div style="flex:1; min-width:140px;">
          <label class="form-label">Sort By</label>
          <select class="form-select"><option>Deadline</option><option>Amount</option><option>Match %</option></select>
        </div>
        <button class="btn btn-gold" type="button">Filter</button>
      </div>
    </div>
    <div class="grid-3" id="scholarship-grid"></div>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
